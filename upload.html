<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crispy Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="head">
        <h1><i>Crispy</i></h1>
        <h2>bites</h2>
        <h3 class="upload-title">Upload your recipe</h3>
    </div>
    <div class="container">
        <div class="sidebar">
            <a href="index.html">
                <img id="home-icon" src="home.svg">
            </a>
            <a href="upload.html">
                <div id="add-recipe">
                    <img id="plus-btn" src="plus.svg">
                </div>
            </a>
        </div>
            <div class="upload-block">
                <div class="upload-layout">
                    <div class="left-upload">
                        <div class="image-box">
                            <img id="preview-image" src="camera.svg">
                        </div>
                        <button
                            type="button"
                            id="image-upload-btn"
                            class="upload-btn"
                        >
                            UPLOAD
                        </button>
                        <input
                            type="file"
                            id="image-input"
                            accept="image/*"
                            style="display:none"
                        >
                    </div>
                    <div class="right-upload">
                        <div class="field-row">
                            <label>Food Name</label>
                            <input
                                id="food-name"
                                type="text"
                                placeholder="Food Name"
                            >
                        </div>
                        <div class="field-row">
                            <label>Chef Name</label>
                            <input
                                id="chef-name"
                                type="text"
                                placeholder="Chef Name"
                            >
                        </div>
                        <div class="field-row">
                            <label>Category</label>
                            <select id="food-type">
                                <option value="Veg">
                                    Veg
                                </option>
                                <option value="Non Veg">
                                    Non Veg
                                </option>
                            </select>
                        </div>
                        <div class="field-row">
                            <label>Ingredients</label>
                            <textarea id="ingredients" placeholder="Enter ingredients"></textarea>
                        </div>
                        <div class="field-row">
                            <label>Steps</label>
                            <textarea id="steps" placeholder="Enter preparation steps"></textarea>
                        </div>
                        <button id="upload-btn" class="upload-btn">
                            Upload
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="upload.js"></script>
</body>
</html>
